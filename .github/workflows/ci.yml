name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  frontend-unit:
    name: Frontend unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm install
      - run: npm test

  # Backend integration tests need Postgres + demo accounts.
  # Run locally: docker compose exec backend npm test
  # See docs/TESTING.md
